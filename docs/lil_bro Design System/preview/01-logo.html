<!doctype html><html><head><meta charset="utf-8">
<title>Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);height:100%;}
  body{
    background-image: var(--scanline);
    display:grid; grid-template-columns: 1.2fr 1fr; gap: 0;
    width: 700px; height: 180px;
  }
  .cell { padding: 22px 26px; display:flex; flex-direction:column; justify-content:center; gap: 10px; }
  .cell + .cell { border-left: 1px solid var(--border); background: var(--bg-surface); }
  .wordmark { font-family: var(--font-display); font-weight: 800; font-size: 56px; letter-spacing: -0.02em; line-height: 1; color: #FFFFFF; }
  .wordmark span { color: var(--accent); text-shadow: 0 0 24px var(--accent-glow); }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
  .mark {
    width: 88px; height: 88px; border-radius: 14px;
    background: var(--bg-deep); border: 1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight: 800; font-size: 40px;
    letter-spacing: -1px; color: var(--text-primary);
  }
  .mark span { color: var(--accent); }
  .marks { display:flex; align-items:center; gap: 14px; }
</style>
</head>
<body>
  <div class="cell">
    <div class="meta">Wordmark</div>
    <div class="wordmark">lil<span>_</span>bro</div>
    <div class="meta" style="color:var(--text-secondary)">JetBrains Mono 800 · −0.02em</div>
  </div>
  <div class="cell">
    <div class="meta">App Mark</div>
    <div class="marks">
      <div class="mark">lb<span>_</span></div>
      <div class="mark" style="background:var(--accent);color:var(--bg-deep);box-shadow:var(--shadow-glow);border-color:transparent"><span style="color:var(--bg-deep)">lb_</span></div>
    </div>
  </div>
</body></html>
