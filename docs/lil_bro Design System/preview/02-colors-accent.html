<!doctype html><html><head><meta charset="utf-8">
<title>Brand colors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);}
  body { width: 700px; padding: 22px 24px; background-image: var(--scanline); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border:1px solid var(--border); border-radius: var(--radius-md); overflow:hidden; }
  .chip { height: 84px; position:relative; }
  .chip.glow { box-shadow: inset 0 0 36px var(--accent-glow); }
  .chip .pin {
    position:absolute; left: 10px; top:10px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.04em;
    padding: 3px 7px; border-radius: 3px;
    background: rgba(0,0,0,0.3); color: #fff; backdrop-filter: blur(4px);
  }
  .info { padding: 10px 12px; background: var(--bg-surface); border-top: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip glow" style="background:#00E5CC"><div class="pin" style="color:#1A1B23;background:rgba(255,255,255,0.2)">ACCENT</div></div><div class="info"><div class="name">Electric Cyan</div><div class="hex">#00E5CC · --accent</div></div></div>
    <div class="sw"><div class="chip" style="background:#D183E8"><div class="pin">BRAND</div></div><div class="info"><div class="name">Magenta</div><div class="hex">#D183E8 · --magenta</div></div></div>
    <div class="sw"><div class="chip" style="background:rgba(0,229,204,0.15);border-bottom:1px solid var(--border-accent)"><div class="pin" style="color:#00E5CC;background:rgba(0,0,0,0.4)">DIM</div></div><div class="info"><div class="name">Accent Dim</div><div class="hex">rgba(0,229,204,.15)</div></div></div>
    <div class="sw"><div class="chip" style="background:rgba(0,229,204,0.3);box-shadow:inset 0 0 30px rgba(0,229,204,0.5)"><div class="pin" style="color:#1A1B23;background:rgba(255,255,255,0.3)">GLOW</div></div><div class="info"><div class="name">Accent Glow</div><div class="hex">rgba(0,229,204,.30)</div></div></div>
  </div>
</body></html>
