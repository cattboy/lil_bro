<!doctype html><html><head><meta charset="utf-8">
<title>Surface colors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0C0D12;color:var(--text-primary);font-family:var(--font-body);}
  body { width: 700px; padding: 22px 24px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border:1px solid var(--border); border-radius: var(--radius-md); overflow:hidden; }
  .chip { height: 84px; background-image: var(--scanline); }
  .info { padding: 10px 12px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#1A1B23"></div><div class="info"><div class="name">Deep</div><div class="hex">#1A1B23 · --bg-deep</div></div></div>
    <div class="sw"><div class="chip" style="background:#24252F"></div><div class="info"><div class="name">Surface</div><div class="hex">#24252F · --bg-surface</div></div></div>
    <div class="sw"><div class="chip" style="background:#2E2F3A"></div><div class="info"><div class="name">Elevated</div><div class="hex">#2E2F3A · --bg-elevated</div></div></div>
    <div class="sw"><div class="chip" style="background:#363745"></div><div class="info"><div class="name">Hover</div><div class="hex">#363745 · --bg-hover</div></div></div>
  </div>
</body></html>
