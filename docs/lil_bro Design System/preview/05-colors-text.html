<!doctype html><html><head><meta charset="utf-8">
<title>Text colors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);}
  body { width: 700px; padding: 24px 26px; background-image: var(--scanline);
         display:grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items:center; }
  .col { display:flex; flex-direction:column; gap: 10px; }
  .row { display:flex; align-items:baseline; gap: 12px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em;
           text-transform: uppercase; color: var(--text-muted); width: 80px; }
  .sample { font-family: var(--font-body); font-size: 15px; font-weight: 500; }
  .hex { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  h4 { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
       letter-spacing: 0.14em; text-transform: uppercase; margin: 0 0 6px; }
</style>
</head>
<body>
  <div class="col">
    <h4>Dark mode</h4>
    <div class="row"><div class="label">Primary</div><div class="sample" style="color:#E8E6E3">Off-white reads easy</div><div class="hex">#E8E6E3</div></div>
    <div class="row"><div class="label">Secondary</div><div class="sample" style="color:#9B9AA0">Secondary descriptors</div><div class="hex">#9B9AA0</div></div>
    <div class="row"><div class="label">Muted</div><div class="sample" style="color:#6B6A70">Quiet meta · timestamps</div><div class="hex">#6B6A70</div></div>
  </div>
  <div class="col" style="background:#FAFAF8;color:#1A1B23;padding:20px;border-radius:var(--radius-md);border:1px solid #D8D5D0">
    <h4 style="color:#8A8990">Light mode</h4>
    <div class="row"><div class="label" style="color:#8A8990">Primary</div><div class="sample" style="color:#1A1B23">Ink for daylight</div><div class="hex" style="color:#8A8990">#1A1B23</div></div>
    <div class="row"><div class="label" style="color:#8A8990">Secondary</div><div class="sample" style="color:#5A5960">Secondary descriptors</div><div class="hex" style="color:#8A8990">#5A5960</div></div>
    <div class="row"><div class="label" style="color:#8A8990">Muted</div><div class="sample" style="color:#8A8990">Quiet meta · timestamps</div><div class="hex" style="color:#8A8990">#8A8990</div></div>
  </div>
</body></html>
