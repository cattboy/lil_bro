<!doctype html><html><head><meta charset="utf-8">
<title>Type — body</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);}
  body { width: 700px; padding: 24px 28px; background-image: var(--scanline); }
  .row { display:flex; align-items:baseline; gap: 14px; padding: 5px 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em;
          text-transform: uppercase; color: var(--text-muted); width: 100px; flex-shrink:0; }
  h2 { font-family: var(--font-mono); font-size: 11px; color: var(--accent);
       letter-spacing: 0.18em; text-transform: uppercase; margin: 0 0 8px; font-weight: 600; }
</style>
</head>
<body>
  <h2>DM Sans · body + UI</h2>
  <div class="row"><div class="meta">lg · 400</div><div style="font-family:var(--font-body);font-size:18.4px;font-weight:400">Your PC is in Balanced mode which throttles CPU clocks.</div></div>
  <div class="row"><div class="meta">md · 400</div><div style="font-family:var(--font-body);font-size:16px;font-weight:400">12.4 GB of shader cache across 3 temp locations. Safe to remove.</div></div>
  <div class="row"><div class="meta">sm · 500</div><div style="font-family:var(--font-body);font-size:14px;font-weight:500">Apply 2 Selected</div></div>
  <div class="row"><div class="meta">xs · 500</div><div style="font-family:var(--font-body);font-size:12.8px;font-weight:500;color:var(--text-secondary)">Dashboard · Output · Revert</div></div>
  <div class="row"><div class="meta">2xs · 400</div><div style="font-family:var(--font-body);font-size:12px;color:var(--text-muted)">Takes ~30 seconds. Lets you roll back any changes if needed.</div></div>
</body></html>
