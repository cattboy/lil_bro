<!doctype html><html><head><meta charset="utf-8">
<title>Spacing scale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);}
  body { width: 700px; padding: 24px 28px; background-image: var(--scanline); }
  .row { display:flex; align-items:center; gap: 14px; padding: 6px 0; font-family: var(--font-mono); font-size: 11px; }
  .token { width: 60px; color: var(--text-muted); letter-spacing: 0.08em; }
  .px    { width: 50px; color: var(--text-secondary); }
  .bar   { height: 12px; background: var(--accent); border-radius: 2px; box-shadow: 0 0 12px var(--accent-glow); }
  h2 { font-family: var(--font-mono); font-size: 11px; color: var(--accent);
       letter-spacing: 0.18em; text-transform: uppercase; margin: 0 0 10px; font-weight: 600; }
</style>
</head>
<body>
  <h2>Spacing · base 8</h2>
  <div class="row"><div class="token">2xs</div><div class="px">2px</div><div class="bar" style="width:2px"></div></div>
  <div class="row"><div class="token">xs</div><div class="px">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="token">sm</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="token">md</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="token">lg</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="token">xl</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="token">2xl</div><div class="px">48px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="token">3xl</div><div class="px">64px</div><div class="bar" style="width:64px"></div></div>
</body></html>
