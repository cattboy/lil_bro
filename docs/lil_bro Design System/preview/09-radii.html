<!doctype html><html><head><meta charset="utf-8">
<title>Radii</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-mono);}
  body { width: 700px; padding: 24px 28px; background-image: var(--scanline);
         display:grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .box {
    width: 110px; height: 84px; background: var(--bg-surface);
    border: 1px solid var(--border-accent);
    box-shadow: inset 0 0 24px rgba(0,229,204,0.06);
  }
  .token { font-size: 12px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.06em; }
  .px    { font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="token">sm</div><div class="px">4px · buttons</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="token">md</div><div class="px">8px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="token">lg</div><div class="px">12px · dialogs</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="token">full</div><div class="px">9999px · dots</div></div>
</body></html>
