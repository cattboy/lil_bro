<!doctype html><html><head><meta charset="utf-8">
<title>Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);}
  body { width: 700px; padding: 24px 28px; background-image: var(--scanline);
         display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; gap: 10px; align-items:center; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em;
           text-transform: uppercase; color: var(--text-muted); width: 70px; flex-shrink:0; }
  .btn {
    font-family: var(--font-body); font-size: 13.5px; font-weight: 500;
    padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer;
    transition: all 150ms ease-out;
  }
  .p { background: var(--accent); color: var(--bg-deep); font-weight: 600; box-shadow: 0 0 16px var(--accent-glow); }
  .p:hover { filter: brightness(1.08); box-shadow: 0 0 24px rgba(0,229,204,0.5); }
  .s { background: transparent; color: var(--accent); border: 1px solid var(--border-accent); }
  .s:hover { background: var(--accent-dim); }
  .g { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .g:hover { background: var(--bg-hover); color: var(--text-primary); }
  .d { background: transparent; color: var(--error); border: 1px solid rgba(255,107,107,0.3); }
  .d:hover { background: rgba(255,107,107,0.08); }
  .icon-btn {
    width: 30px; height: 28px; display:inline-flex; align-items:center; justify-content:center;
    background: transparent; color: var(--text-muted); border: 1px solid var(--border);
    border-radius: 3px; font-family: var(--font-mono); font-size: 11px; cursor:pointer;
  }
</style>
</head>
<body>
  <div class="row"><div class="label">Primary</div>
    <button class="btn p">Apply 2 Selected</button>
    <button class="btn p">Yes, Continue</button>
  </div>
  <div class="row"><div class="label">Secondary</div>
    <button class="btn s">Test Polling</button>
    <button class="btn s">▶ Run Scan</button>
  </div>
  <div class="row"><div class="label">Ghost</div>
    <button class="btn g">Skip</button>
    <button class="btn g">Cancel</button>
  </div>
  <div class="row"><div class="label">Danger</div>
    <button class="btn d">Cancel Download</button>
    <button class="btn d">Revert All Fixes</button>
  </div>
  <div class="row"><div class="label">Icon</div>
    <button class="icon-btn">−</button>
    <button class="icon-btn">▢</button>
    <button class="icon-btn" style="color:var(--error)">✕</button>
  </div>
</body></html>
